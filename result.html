<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MindEase Report</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<style>
body {
background: linear-gradient(135deg,#020617,#0f172a);
}
</style>
</head>

<body class="text-white text-center p-6">

<h2 class="text-2xl mb-4">Your Mental Report 💙</h2>

<div id="score" class="text-5xl mb-4">0%</div>

<p class="opacity-70">You’re doing better than you think 🌿</p>

<button onclick="breath()" class="mt-4 bg-blue-500 px-4 py-2 rounded">
Breathing Exercise
</button>

<div id="breathBox" class="mt-6 text-xl"></div>

<button onclick="window.location.href='index.html'" class="mt-6 underline">
Start Again
</button>

<script>

let mood = localStorage.getItem("mood") || 5;
let score = mood * 10;

document.getElementById("score").innerText = score + "%";

// animation
gsap.from("#score",{scale:0, duration:1});

// breathing
function breath(){
let box=document.getElementById("breathBox");

gsap.to(box,{
scale:1.5,
duration:2,
repeat:-1,
yoyo:true,
onUpdate:()=>{
box.innerText="Breathe in… Breathe out 🌿";
}
});
}

</script>

</body>
</html>
