<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MindEase AI</title>

<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- CSS -->
<link rel="stylesheet" href="style.css">

</head>

<body class="bg-[#0f172a] text-white flex justify-center">

<div class="app">

<!-- HEADER -->
<div class="header glass">
    <h1>🌿 MindEase</h1>
</div>

<!-- CHAT -->
<div id="chat" class="chat"></div>

<!-- TYPING -->
<div id="typing" class="typing">AI is thinking...</div>

<!-- INPUT -->
<div class="input-area glass">
    <input id="input" placeholder="Talk to me...">
    <button onclick="send()">➤</button>
</div>

<!-- QUIZ BUTTON -->
<button class="quiz-btn" onclick="startQuiz()">Take Assessment</button>

</div>

<!-- JS -->
<script src="script.js"></script>

</body>
</html>
</html>
